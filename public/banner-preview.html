<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner 移动端预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .layout { display: flex; justify-content: center; gap: 32px; padding: 24px; flex-wrap: wrap; }
    .controls {
      background: #16213e; border-radius: 16px; padding: 24px; color: #e0e0e0;
      min-width: 280px; max-width: 320px; display: flex; flex-direction: column; gap: 16px;
    }
    .controls h2 { font-size: 16px; color: #fff; margin-bottom: 4px; }
    .controls label { font-size: 13px; color: #aaa; }
    .controls input[type="file"] {
      display: block; font-size: 13px; color: #aaa; margin-top: 4px;
    }
    .controls .preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .controls .preset-row button {
      padding: 5px 10px; border: 1px solid #333; border-radius: 6px;
      background: #0f3460; color: #ccc; font-size: 12px; cursor: pointer;
    }
    .controls .preset-row button:hover { background: #1a5276; }
    .controls .preset-row button.active { background: #3475ed; border-color: #3475ed; color: #fff; }
    .controls .info { font-size: 12px; color: #888; line-height: 1.6; background: #0d1b30; padding: 10px; border-radius: 8px; }
    .controls .info strong { color: #bcd6ff; }
    .controls .slider-row { display: flex; align-items: center; gap: 8px; }
    .controls .slider-row input[type="range"] { flex: 1; }
    .controls .slider-row span { font-size: 13px; color: #bcd6ff; min-width: 40px; text-align: right; }

    .phone-frame {
      position: relative; background: #111; border-radius: 40px; padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 0 2px #333;
      flex-shrink: 0;
    }
    .phone-notch {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 28px; background: #111; border-radius: 0 0 16px 16px; z-index: 10;
    }
    .phone-screen { border-radius: 28px; overflow: hidden; background: #fff; width: 390px; }
    .phone-home-bar {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 4px; background: #555; border-radius: 2px;
    }

    .banner-container { position: relative; width: 100%; overflow: hidden; background: #eaf2fb; }
    .banner-container img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(7,30,63,0.72) 0%, rgba(13,49,91,0.56) 39%, rgba(17,54,91,0.14) 72%, transparent 100%);
    }
    .banner-content {
      position: absolute; inset: 0; display: flex; align-items: center;
      padding: 0 20px;
    }
    .banner-content-inner { max-width: 280px; }
    .banner-content-inner h1 { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 10px; }
    .banner-content-inner p { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.5; }

    .comparison { display: flex; gap: 12px; margin-top: 8px; }
    .comparison .col { flex: 1; text-align: center; }
    .comparison .col .label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .comparison .col .box {
      background: #0d1b30; border-radius: 8px; padding: 8px;
      font-size: 12px; color: #bcd6ff;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- 控制面板 -->
    <div class="controls">
      <h2>Banner 移动端预览</h2>

      <div>
        <label>上传图片（或选择预设尺寸生成占位图）</label>
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <div>
        <label>预设尺寸</label>
        <div class="preset-row">
          <button class="active" onclick="setPreset(750,600,this)">750×600 (5:4)</button>
          <button onclick="setPreset(750,300,this)">750×300 (5:2)</button>
          <button onclick="setPreset(750,400,this)">750×400 (15:8)</button>
          <button onclick="setPreset(900,1200,this)">900×1200 (3:4)</button>
          <button onclick="setPreset(1080,600,this)">1080×600 (9:5)</button>
        </div>
      </div>

      <div>
        <label>容器高度：<span id="heightLabel">300</span>px</label>
        <div class="slider-row">
          <input type="range" id="heightSlider" min="200" max="500" value="300" oninput="setContainerHeight(this.value)">
        </div>
      </div>

      <div>
        <label>设备宽度：<span id="widthLabel">390</span>px</label>
        <div class="slider-row">
          <input type="range" id="widthSlider" min="320" max="430" value="390" oninput="setDeviceWidth(this.value)">
        </div>
      </div>

      <div class="info" id="infoPanel">
        <strong>当前状态</strong><br>
        容器：390 × 300 px<br>
        容器比例：1.3 : 1<br>
        图片：750 × 600 px<br>
        图片比例：1.25 : 1<br>
        裁切：左右各裁约 <span id="cropInfo">2%</span>
      </div>
    </div>

    <!-- 手机预览 -->
    <div class="phone-frame" id="phoneFrame">
      <div class="phone-notch"></div>
      <div class="phone-screen" id="phoneScreen">
        <!-- Banner 模拟 -->
        <div class="banner-container" id="bannerContainer" style="height: 300px;">
          <img id="bannerImg" src="" alt="Banner 预览" style="display:none;">
          <canvas id="placeholderCanvas" width="750" height="600" style="display:none;"></canvas>
          <div class="banner-overlay"></div>
          <div class="banner-content">
            <div class="banner-content-inner">
              <h1>页面标题文字</h1>
              <p>这里是副标题或描述文字，展示Banner区域的文字叠加效果</p>
            </div>
          </div>
        </div>
        <!-- 模拟页面内容 -->
        <div style="padding: 20px; background: #fff;">
          <div style="height: 16px; background: #e8e8e8; border-radius: 4px; margin-bottom: 12px; width: 60%;"></div>
          <div style="height: 12px; background: #f0f0f0; border-radius: 4px; margin-bottom: 8px;"></div>
          <div style="height: 12px; background: #f0f0f0; border-radius: 4px; margin-bottom: 8px; width: 85%;"></div>
          <div style="height: 12px; background: #f0f0f0; border-radius: 4px; margin-bottom: 20px; width: 70%;"></div>
          <div style="display: flex; gap: 8px; margin-bottom: 20px;">
            <div style="flex:1; height: 80px; background: #f5f5f5; border-radius: 8px;"></div>
            <div style="flex:1; height: 80px; background: #f5f5f5; border-radius: 8px;"></div>
          </div>
          <div style="height: 12px; background: #f0f0f0; border-radius: 4px; margin-bottom: 8px; width: 90%;"></div>
          <div style="height: 12px; background: #f0f0f0; border-radius: 4px; margin-bottom: 8px;"></div>
          <div style="height: 12px; background: #f0f0f0; border-radius: 4px; width: 50%;"></div>
        </div>
      </div>
      <div class="phone-home-bar"></div>
    </div>
  </div>

  <script>
    let imgW = 750, imgH = 600;
    let containerH = 300;
    let deviceW = 390;
    let uploadedImg = null;

    const canvas = document.getElementById('placeholderCanvas');
    const ctx = canvas.getContext('2d');
    const bannerImg = document.getElementById('bannerImg');

    // 生成占位图
    function generatePlaceholder(w, h) {
      canvas.width = w;
      canvas.height = h;
      // 渐变背景
      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, '#1a3a6b');
      grad.addColorStop(0.5, '#2563eb');
      grad.addColorStop(1, '#1a3a6b');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
      // 网格线
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < w; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
      for (let y = 0; y < h; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
      // 中心标记
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(w * 0.1, h * 0.1, w * 0.8, h * 0.8);
      ctx.setLineDash([]);
      // 尺寸文字
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(w + ' × ' + h, w / 2, h / 2 - 10);
      ctx.font = '18px sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      const ratio = (w / h).toFixed(2);
      ctx.fillText('比例 ' + ratio + ':1', w / 2, h / 2 + 24);

      return canvas.toDataURL('image/png');
    }

    function updatePreview() {
      const container = document.getElementById('bannerContainer');
      container.style.height = containerH + 'px';

      if (!uploadedImg) {
        const src = generatePlaceholder(imgW, imgH);
        bannerImg.src = src;
        bannerImg.style.display = 'block';
      }

      // 计算裁切
      const containerRatio = deviceW / containerH;
      const imgRatio = imgW / imgH;
      let cropText = '无裁切';
      if (imgRatio < containerRatio) {
        const cropPct = ((1 - imgRatio / containerRatio) * 100).toFixed(1);
        cropText = '左右各裁约 ' + (cropPct / 2).toFixed(1) + '%';
      } else if (imgRatio > containerRatio) {
        const cropPct = ((1 - containerRatio / imgRatio) * 100).toFixed(1);
        cropText = '上下各裁约 ' + (cropPct / 2).toFixed(1) + '%';
      }

      document.getElementById('infoPanel').innerHTML =
        '<strong>当前状态</strong><br>' +
        '容器：' + deviceW + ' × ' + containerH + ' px<br>' +
        '容器比例：' + containerRatio.toFixed(2) + ' : 1<br>' +
        '图片：' + imgW + ' × ' + imgH + ' px<br>' +
        '图片比例：' + imgRatio.toFixed(2) + ' : 1<br>' +
        '裁切：<span style="color:#ff6b6b">' + cropText + '</span>';
    }

    function setPreset(w, h, btn) {
      imgW = w; imgH = h;
      uploadedImg = null;
      document.querySelectorAll('.preset-row button').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      updatePreview();
    }

    function setContainerHeight(val) {
      containerH = parseInt(val);
      document.getElementById('heightLabel').textContent = val;
      updatePreview();
    }

    function setDeviceWidth(val) {
      deviceW = parseInt(val);
      document.getElementById('widthLabel').textContent = val;
      document.getElementById('phoneScreen').style.width = val + 'px';
      updatePreview();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          imgW = img.width;
          imgH = img.height;
          uploadedImg = ev.target.result;
          bannerImg.src = uploadedImg;
          bannerImg.style.display = 'block';
          document.querySelectorAll('.preset-row button').forEach(b => b.classList.remove('active'));
          updatePreview();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 初始化
    updatePreview();
  </script>
</body>
</html>
