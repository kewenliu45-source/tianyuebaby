<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享图片模板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 800px;
      height: 800px;
      overflow: hidden;
    }

    .share-card {
      width: 800px;
      height: 800px;
      background: linear-gradient(135deg, #1a3a6b 0%, #2563eb 50%, #1a3a6b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      font-family: "Microsoft YaHei", "微软雅黑", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    .logo-container {
      width: 200px;
      height: 200px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 20px;
    }

    .logo-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 10px;
    }

    .brand-name {
      color: #ffffff;
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 4px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .brand-subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-size: 28px;
      text-align: center;
      letter-spacing: 2px;
    }

    .decorative-line {
      width: 100px;
      height: 3px;
      background: rgba(255, 255, 255, 0.6);
      margin: 30px 0;
      border-radius: 2px;
    }

    .website-url {
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      margin-top: 40px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="share-card">
    <div class="logo-container">
      <img src="ab77371a27cf1d3f8c43fc766e8fe593.jpg" alt="天悦宝贝 Logo">
    </div>
    <div class="brand-name">天悦宝贝</div>
    <div class="decorative-line"></div>
    <div class="brand-subtitle">（国际）助孕中心</div>
    <div class="website-url">zhuyunbaby.com</div>
  </div>
</body>
</html>
