<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 800px;
      height: 800px;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a3a6b 0%, #2563eb 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Microsoft YaHei", "微软雅黑", sans-serif;
    }
    .logo {
      width: 200px;
      height: 200px;
      margin-bottom: 40px;
    }
    .title {
      color: white;
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }
    .subtitle {
      color: rgba(255,255,255,0.8);
      font-size: 24px;
      text-align: center;
    }
  </style>
</head>
<body>
  <img class="logo" src="tianyue-logo-mark.png" alt="Logo">
  <div class="title">天悦宝贝（国际）助孕中心</div>
  <div class="subtitle">专业助孕咨询服务</div>
</body>
</html>
